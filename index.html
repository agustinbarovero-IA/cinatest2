<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Grupo CINA</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img src="cina_logo_principal.png" alt="CINA" onerror="this.style.display='none'">
          <div class="brand-copy">
            <h1 id="screenTitle">BIENVENIDOS AL SISTEMA DE GRUPO CINA</h1>
            <p>SISTEMA DE GESTIÓN DE OPERACIONES</p>
          </div>
        </div>
        <div class="toolbar">
          <button id="backBtn" disabled>← Volver</button>
          <button id="homeBtn">Inicio</button>
          <button class="btn-user">Usuario</button>
        </div>
      </header>

      <section class="meta-panel">
        <div class="data-strip">
          <div class="data-box green">
            <div><span class="data-label">ESTIBAS EN PLANTA</span><span class="data-number">6500</span></div>
          </div>
          <div class="data-box orange">
            <div><span class="data-label">SIN UBICACIÓN</span><span class="data-number">1050</span></div>
          </div>
          <div class="data-box red">
            <div><span class="data-label">VENCIDAS</span><span class="data-number">189</span></div>
          </div>
          <div class="data-box qr">
            <div><span class="data-label">SCAN</span><span class="data-number">QR</span></div>
          </div>
        </div>
      </section>

      <main class="workspace">
        <div id="menuGrid" class="menu-grid"></div>
      </main>

      <footer class="footer-bar">Sistema interno Grupo CINA © 2026</footer>
    </div>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
