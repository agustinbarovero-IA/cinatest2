<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Grupo CINA</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="cina_logo_principal.png" alt="CINA" onerror="this.style.display='none'">
        <div class="brand-copy">
          <h1 id="screenTitle">BIENVENIDOS AL SISTEMA DE GRUPO CINA</h1>
          <p id="screenSubtitle">SISTEMA DE GESTIÓN DE OPERACIONES</p>
        </div>
      </div>
      <div class="toolbar">
        <button id="backBtn" disabled>← Volver</button>
        <button id="homeBtn">Inicio</button>
        <button id="fullscreenBtn">Pantalla completa</button>
        <button id="userBtn" class="btn-user">Administrar usuario</button>
      </div>
    </header>

    <section class="meta-panel">
      <div class="data-strip">
        <div class="data-box green"><div><span class="data-label">TUNEL 2</span><span class="data-number">35</span></div></div>
        <div class="data-box green"><div><span class="data-label">TUNEL 9</span><span class="data-number">45</span></div></div>
        <div class="data-box green"><div><span class="data-label">TUNEL 10</span><span class="data-number">40</span></div></div>
        <div class="data-box green"><div><span class="data-label">VEHICULOS</span><span class="data-number">20</span></div></div>
        <div class="data-box green"><div><span class="data-label">ESTIBAS EN PLANTA</span><span class="data-number">6500</span></div></div>
        <div class="data-box qr" id="qrBox"><div><span>SCAN QR</span></div></div>
        <div class="data-box orange" id="sinUbicacionBox"><div><span class="data-label">SIN UBICACION</span><span class="data-number">1050</span></div></div>
        <div class="data-box red" id="vencidasBox"><div><span class="data-label">VENCIDAS</span><span class="data-number">189</span></div></div>
      </div>
    </section>

    <main class="workspace">
      <div id="menuGrid" class="menu-grid"></div>
    </main>

    <footer class="footer-bar">Sistema interno Grupo CINA</footer>
  </div>
  <script type="module" src="/src/app.ts"></script>
</body>
</html>
